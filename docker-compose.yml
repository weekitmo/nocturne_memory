# Before running: python scripts/setup_docker.py
# The setup script auto-generates .env with secure credentials.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nocturne_memory}
      POSTGRES_USER: ${POSTGRES_USER:-nocturne}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run python scripts/setup_docker.py first}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB:-nocturne_memory} -U $${POSTGRES_USER:-nocturne}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    command: python run_sse.py
    environment:
      SNAPSHOT_DIR: /app/snapshots
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - snapshots_data:/app/snapshots
      - backups_data:/app/backups
      - ./config.json:/app/config.json
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8233/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nginx:
    build:
      context: ./frontend
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  snapshots_data:
  backups_data:
